name: Package Image CI

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Log in to GitHub Container Registry
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Build once and tag for both registries
      - name: Build image
        run: |
          docker build \
            -t ghcr.io/kinola-iq/motocura-chatbot-backend:${{ github.sha }} \
            -t ghcr.io/kinola-iq/motocura-chatbot-backend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/motocura-chatbot-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/motocura-chatbot-backend:latest \
            .

      # Push to GitHub Container Registry
      - name: Push to GitHub Container Registry
        run: |
          docker push ghcr.io/kinola-iq/motocura-chatbot-backend:${{ github.sha }}
          docker push ghcr.io/kinola-iq/motocura-chatbot-backend:latest

      # Push to Docker Hub
      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/motocura-chatbot-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/motocura-chatbot-backend:latest